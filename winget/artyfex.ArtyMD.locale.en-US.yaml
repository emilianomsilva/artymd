ShortDescription: Lightweight Markdown reader with live preview, KaTeX math rendering, and Mermaid diagrams.
Description: >-
  ArtyMD is a lightweight, cross-platform Markdown reader built with Tauri.
  It features live preview with split-pane view, KaTeX math rendering
  (inline and display mode), Mermaid diagram support, syntax highlighting
  for 50+ languages, find-in-document search, auto-reload on file changes,
  and print/PDF export with customizable themes and page settings.
