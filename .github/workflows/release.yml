name: Release

# Builds ArtyMD installers for Linux, Windows, and macOS whenever a tag like
# `v0.1.0` is pushed, then attaches the produced bundles to the matching
# GitHub Release.
#
# Trigger: push a git tag matching `v*` (e.g. `git tag v0.1.4 && git push --tags`).
# A draft release is created automatically by `softprops/action-gh-release`; the
# workflow then uploads all platform artifacts to it.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Linux — build .deb, .rpm and .AppImage on an Ubuntu runner.
  # ────────────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ────────────────────────────────────────────────────────────────────────
  # Windows — build .msi on a Windows runner.
  # ────────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri MSI bundle
        run: npx tauri build --bundles msi

      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi

  # ────────────────────────────────────────────────────────────────────────
  # macOS — build .dmg bundle on a macOS runner.
  # ────────────────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri DMG bundle
        run: npx tauri build --bundles dmg,app

      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg