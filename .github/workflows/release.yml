name: Release

# Builds ArtyMD installers for Linux and Windows whenever a tag like `v0.1.0`
# is pushed, then attaches the produced bundles to the matching GitHub Release.
#
# macOS is intentionally NOT built here — the free macOS-runner minutes are too
# scarce for a hobby project. Build macOS locally and upload with:
#   cargo tauri build --bundles dmg
#   gh release upload "$TAG" src-tauri/target/release/bundle/dmg/*.dmg
#
# Trigger: push a git tag matching `v*` (e.g. `git tag v0.1.0 && git push --tags`).
# A draft release is created automatically by `softprops/action-gh-release`; the
# workflow then uploads the artifacts to it.

on:
  push:
    tags:
      - 'v*'

# Useful permissions for a release workflow: write to releases and contents
# so the upload step can attach binaries to the tag's release.
permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Linux — build .deb, .rpm and .AppImage on an Ubuntu runner.
  # Ubuntu runners are free and unlimited for public repos, so this is the
  # only job that's truly "free forever" regardless of release cadence.
  # ────────────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      # Tauri on Linux needs webkit2gtk and a few build deps for .deb/.rpm.
      # These are the system packages listed in the Tauri 2 prerequisites for
      # Ubuntu. We install them via apt.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles
        # Build all three Linux bundle formats from a single invocation. Tauri
        # will compile the Rust binary once and then package it three ways.
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ────────────────────────────────────────────────────────────────────────
  # Windows — build .msi on a Windows runner.
  # The free Windows minutes (2,000/month) are more than enough for the
  # release cadence of a hobby project (one build ~= ~10-15 min).
  # ────────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri MSI bundle
        # Only build the MSI on Windows — Tauri's wry crate pulls in WebView2
        # automatically; no extra system deps are needed here.
        run: npx tauri build --bundles msi

      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi